<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nabila Busana</title>

<style>

body{
margin:0;
overflow:hidden;
background:#111;
}

canvas{
display:block;
}

h1{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:10;
font-family:Arial;
}

</style>

</head>

<body>

<h1>Nabila Busana</h1>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<div class="products">

<button onclick="
changeClothes(
'./textures/hoodie-black.jpg'
)
">

Hoodie Black

</button>

<button onclick="
changeClothes(
'./textures/hoodie-white.jpg'
)
">

Hoodie White

</button>

<button onclick="
changeClothes(
'./textures/tshirt-red.jpg'
)
">

Tshirt Red

</button>

</div>

<script>

/* SCENE */
const scene =
new THREE.Scene();

/* CAMERA */
const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1,3);

/* RENDERER */
const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

renderer.setPixelRatio(
window.devicePixelRatio
);

document.body.appendChild(
renderer.domElement
);

/* LIGHT */
const light =
new THREE.HemisphereLight(
0xffffff,
0x444444,
5
);

scene.add(light);

/* TEST CUBE */
const cube =
new THREE.Mesh(

new THREE.BoxGeometry(),

new THREE.MeshBasicMaterial({
color:0xffffff,
wireframe:true
})

);

scene.add(cube);

/* LOADER */
const loader =
new THREE.GLTFLoader();
let bodyMaterial;

loader.load(

'./models/body.glb',

function(gltf){

console.log("MODEL MASUK");

/* HAPUS KUBUS */
scene.remove(cube);

const model =
gltf.scene;

model.scale.set(
1,
1,
1
);

model.position.set(
0,
0,
0
);

model.rotation.y =
0;

camera.position.z = 5;

scene.add(model);

model.traverse((child)=>{

if(child.isMesh){

bodyMaterial =
child.material;

}

});

},

undefined,

function(error){

console.error(error);

}

);

/* ANIMATE */
function animate(){

requestAnimationFrame(
animate
);

cube.rotation.x += 0.01;
cube.rotation.y += 0.01;

renderer.render(
scene,
camera
);

}

animate();

const textureLoader =
new THREE.TextureLoader();

function changeClothes(texturePath){

const texture =
textureLoader.load(texturePath);

bodyMaterial.map =
texture;

bodyMaterial.needsUpdate =
true;

}

</script>

</body>
</html>
