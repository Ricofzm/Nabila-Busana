<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nabila Busana</title>

<style>

body{
margin:0;
overflow:hidden;
background:#111;
}

canvas{
display:block;
}

h1{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:10;
font-family:Arial;
}

</style>

</head>

<body>

<h1>Nabila Busana</h1>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* SCENE */
const scene =
new THREE.Scene();

/* CAMERA */
const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 3;

/* RENDERER */
const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

/* CUBE */
const geometry =
new THREE.BoxGeometry();

const material =
new THREE.MeshBasicMaterial({
color:0xffffff,
wireframe:true
});

const cube =
new THREE.Mesh(
geometry,
material
);

scene.add(cube);

/* ANIMATE */
function animate(){

requestAnimationFrame(
animate
);

cube.rotation.x += 0.01;
cube.rotation.y += 0.01;

renderer.render(
scene,
camera
);

}

animate();

</script>

</body>
</html>
