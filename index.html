<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>VogueFit</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
VOGUEFIT
</div>

</nav>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="sidebar">

<h2>SELECT ITEM</h2>

<div class="tabs">

<div class="tab active"
onclick="showCategory('tops',this)">
TOP
</div>

<div class="tab"
onclick="showCategory('pants',this)">
PANTS
</div>

<div class="tab"
onclick="showCategory('shoes',this)">
SHOES
</div>

</div>

<!-- TOPS -->

<div class="product-grid category"
id="tops">

<div class="product-card"
onclick="
openModal(
'Black Hoodie',
299000,
'assets/hoodie-black.PNG',
'top'
)
">

<img src="assets/tbhoodie.PNG">

<div class="product-name">
Black Hoodie
</div>

<div class="product-price">
IDR 299.000
</div>

</div>

</div>

<!-- PANTS -->

<div class="product-grid category"
id="pants"
style="display:none;">

<div class="product-card"
onclick="
openModal(
'Cargo Pants',
259000,
'assets/pants-beige.PNG',
'pants'
)
">

<img src="assets/pants-beige.PNG">

<div class="product-name">
Cargo Pants
</div>

<div class="product-price">
IDR 259.000
</div>

</div>

</div>

<!-- SHOES -->

<div class="product-grid category"
id="shoes"
style="display:none;">

<div class="product-card"
onclick="
openModal(
'Sneakers White',
399000,
'assets/shoes-white.PNG',
'shoes'
)
">

<img src="assets/tbshoes.PNG">

<div class="product-name">
Sneakers White
</div>

<div class="product-price">
IDR 399.000
</div>

</div>

</div>

</div>

<!-- CENTER -->

<div class="viewer">
    
<!-- CONTROLS -->
<div class="controls">

<!-- MAIN BUTTON -->

<button
class="main-fab"
onclick="toggleMenu()">
＋
</button>

<!-- MENU -->

<div
class="fab-menu"
id="fabMenu">

<button
class="control-btn"
onclick="zoomIn()">
🔍+
</button>

<button
class="control-btn"
onclick="zoomOut()">
🔍-
</button>

<button
class="control-btn"
onclick="rotateLeft()">
⟲
</button>

<button
class="control-btn"
onclick="rotateRight()">
⟳
</button>

<button
class="control-btn"
onclick="resetView()">
↺
</button>

<button
class="control-btn"
onclick="saveOutfit()">
💾
</button>

<button
class="control-btn"
onclick="resetOutfit()">
✖️
</button>

</div>

</div>

<div
class="mannequin-area"
id="viewerModel">

<!-- BODY -->

<img
class="layer body"
src="assets/mannequin.PNG"
>

<!-- PANTS -->

<img
id="pantsLayer"
class="layer pants"
src="assets/pants-beige.PNG"
>

<!-- TOP -->

<img
id="topLayer"
class="layer top"
src="assets/hoodie-black.PNG"
>

<!-- SHOES -->

<img
id="shoesLayer"
class="layer shoes"
src="assets/shoes-white.PNG"
>

</div>

</div>

<!-- CART -->

<!-- CART -->

<div class="cart-panel">

<h2>CART</h2>

<div
class="cart-items"
id="cartItems">
</div>

<!-- SUMMARY -->

<div class="summary">

<div class="summary-row">

<span>Subtotal</span>

<span id="subtotalPrice">
IDR 0
</span>

</div>

<div class="summary-row">

<span>Shipping</span>

<span id="shippingPrice">
IDR 20.000
</span>

</div>

<div class="summary-row total">

<span>Total</span>

<span id="totalPrice">
IDR 0
</span>

</div>

<button class="checkout-btn">
CHECKOUT
</button>

</div>

</div>

</div>

<!-- PRODUCT MODAL -->

<div
class="product-modal"
id="productModal">

<div class="modal-box">

<!-- CLOSE -->

<button
class="close-modal"
onclick="closeModal()">
✕
</button>

<!-- IMAGE -->

<img
id="modalImage"
class="modal-image"
src=""
>

<!-- INFO -->

<div class="modal-info">

<h2 id="modalTitle">
Product
</h2>

<p
class="modal-price"
id="modalPrice">
IDR 0
</p>

<p class="modal-desc">

Premium oversized fashion
with modern streetwear silhouette.

</p>

<button
class="modal-cart-btn"
onclick="addModalToCart()">
ADD TO CART
</button>

</div>

</div>

</div>

<script src="
https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js
"></script>
<script src="script.js"></script>
</body>
</html>
