<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nabila Busana</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
background:#111;
font-family:Arial;
color:white;
}

#viewer{
width:100vw;
height:100vh;
}

h1{
position:absolute;
top:30px;
left:30px;
z-index:10;
}

</style>

</head>

<body>

<h1>Nabila Busana</h1>

<div id="viewer"></div>

<script type="module">

import * as THREE
from 'https://unpkg.com/three@0.152.2/build/three.module.js';

import { OrbitControls }
from 'https://unpkg.com/three@0.152.2/examples/jsm/controls/OrbitControls.js';

/* SCENE */
const scene =
new THREE.Scene();

scene.background =
new THREE.Color(0x111111);

/* CAMERA */
const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.z = 3;

/* RENDERER */
const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document
.getElementById("viewer")
.appendChild(renderer.domElement);

/* LIGHT */
const light =
new THREE.HemisphereLight(
0xffffff,
0x444444,
5
);

scene.add(light);

/* CUBE */
const cube =
new THREE.Mesh(

new THREE.BoxGeometry(),

new THREE.MeshStandardMaterial({
color:"white"
})

);

scene.add(cube);

/* CONTROLS */
const controls =
new OrbitControls(
camera,
renderer.domElement
);

/* ANIMATE */
function animate(){

requestAnimationFrame(
animate
);

cube.rotation.y += 0.01;

controls.update();

renderer.render(
scene,
camera
);

}

animate();

</script>

</body>
</html>
