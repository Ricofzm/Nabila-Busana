<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>VogueFit</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
VOGUEFIT
</div>

</nav>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="sidebar">

<h2>Select Item</h2>

<button onclick="
changeTop('assets/hoodie-black.png')
">
Black Hoodie
</button>

<button onclick="
changePants('assets/pants-beige.png')
">
Cargo Pants
</button>

<button onclick="
changeShoes('assets/shoes-white.png')
">
Sneakers
</button>

</div>

<!-- CENTER -->

<div class="viewer">

<div class="mannequin-area">

<!-- BODY -->

<img
class="layer body"
src="assets/mannequin.png"
>

<!-- PANTS -->

<img
id="pantsLayer"
class="layer pants"
src="assets/pants-beige.png"
>

<!-- TOP -->

<img
id="topLayer"
class="layer top"
src="assets/hoodie-black.png"
>

<!-- SHOES -->

<img
id="shoesLayer"
class="layer shoes"
src="assets/shoes-white.png"
>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
