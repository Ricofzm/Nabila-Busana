<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nabila Busana</title>

<style>

body{
margin:0;
overflow:hidden;
background:#111;
}

canvas{
display:block;
}

h1{
position:absolute;
top:20px;
left:20px;
color:white;
z-index:10;
font-family:Arial;
}

</style>

</head>

<body>

<h1>Nabila Busana</h1>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128/examples/js/loaders/GLTFLoader.js"></script>

<script>

/* SCENE */
const scene =
new THREE.Scene();

/* CAMERA */
const camera =
new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
);

camera.position.set(0,1,3);

/* RENDERER */
const renderer =
new THREE.WebGLRenderer({
antialias:true
});

renderer.setSize(
window.innerWidth,
window.innerHeight
);

document.body.appendChild(
renderer.domElement
);

/* LIGHT */
const light =
new THREE.HemisphereLight(
0xffffff,
0x444444,
5
);

scene.add(light);

/* TEST CUBE */
const cube =
new THREE.Mesh(

new THREE.BoxGeometry(),

new THREE.MeshBasicMaterial({
color:0xffffff,
wireframe:true
})

);

scene.add(cube);

/* LOADER */
const loader =
new THREE.GLTFLoader();

loader.load(

'./models/body.glb',

function(gltf){

console.log("MODEL MASUK");

/* HAPUS KUBUS */
scene.remove(cube);

const model =
gltf.scene;

model.scale.set(
0.1,
0.1,
0.1
);

model.position.set(
0,
0,
0
);

model.rotation.y =
Math.PI;

camera.position.z = 15;

scene.add(model);

},

undefined,

function(error){

console.error(error);

}

);

/* ANIMATE */
function animate(){

requestAnimationFrame(
animate
);

cube.rotation.x += 0.01;
cube.rotation.y += 0.01;

renderer.render(
scene,
camera
);

}

animate();

</script>

</body>
</html>
