<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>VogueFit</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
VOGUEFIT
</div>

</nav>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="sidebar">

<h2>SELECT ITEM</h2>

<div class="product-grid">

<!-- HOODIE -->

<div class="product-card"
onclick="
changeTop('assets/hoodie-black.PNG')
">

<img src="assets/hoodie-black.PNG">

<div class="product-name">
Black Hoodie
</div>

<div class="product-price">
IDR 299.000
</div>

</div>

<!-- PANTS -->

<div class="product-card"
onclick="
changePants('assets/pants-beige.PNG')
">

<img src="assets/pants-beige.PNG">

<div class="product-name">
Cargo Pants
</div>

<div class="product-price">
IDR 259.000
</div>

</div>

<!-- SHOES -->

<div class="product-card"
onclick="
changeShoes('assets/shoes-white.PNG')
">

<img src="assets/shoes-white.PNG">

<div class="product-name">
Sneakers White
</div>

<div class="product-price">
IDR 399.000
</div>

</div>

</div>

</div>

<button onclick="
changeTop('assets/hoodie-black.PNG')
">
Black Hoodie
</button>

<button onclick="
changePants('assets/pants-beige.PNG')
">
Cargo Pants
</button>

<button onclick="
changeShoes('assets/shoes-white.PNG')
">
Sneakers
</button>

</div>

<!-- CENTER -->

<div class="viewer">

<div class="mannequin-area">

<!-- BODY -->

<img
class="layer body"
src="assets/mannequin.PNG"
>

<!-- PANTS -->

<img
id="pantsLayer"
class="layer pants"
src="assets/pants-beige.png"
>

<!-- TOP -->

<img
id="topLayer"
class="layer top"
src="assets/hoodie-black.png"
>

<!-- SHOES -->

<img
id="shoesLayer"
class="layer shoes"
src="assets/shoes-white.png"
>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
