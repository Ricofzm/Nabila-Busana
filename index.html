<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nabila Busana</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
Nabila Busana
</div>

<!-- WISHLIST -->

<div
class="wishlist-nav"
onclick="openWishlist()"
>

<svg
width="22"
height="22"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2"
>

<path d="M6 2L3 6V20a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>

<line x1="3" y1="6" x2="21" y2="6"/>

<path d="M16 10a4 4 0 0 1-8 0"/>

</svg>

<span id="wishlistCount">
0
</span>

</div>
</nav>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="sidebar">

<h2>SELECT ITEM</h2>

<input
type="text"
class="search-input"
placeholder="Search outfit..."
onkeyup="searchProduct(this.value)"
>

<div class="tabs">

<div class="tab active"
onclick="showCategory('tops',this)">
TOP
</div>

<div class="tab"
onclick="showCategory('pants',this)">
PANTS
</div>

<div class="tab"
onclick="showCategory('shoes',this)">
SHOES
</div>

</div>

<div class="product-grid category"
id="tops">
</div>

<div class="product-grid category"
id="pants"
style="display:none;">
</div>

<div class="product-grid category"
id="shoes"
style="display:none;">
</div>

<!-- CENTER -->

<div class="viewer-section">
    
<!-- CONTROLS -->
<div class="controls">

<!-- MAIN BUTTON -->

<button
class="main-fab"
onclick="toggleMenu()">
＋
</button>

<!-- MENU -->

<div
class="fab-menu"
id="fabMenu">

<button
class="control-btn"
onclick="zoomIn()">
🔍+
</button>

<button
class="control-btn"
onclick="zoomOut()">
🔍-
</button>

<button
class="control-btn"
onclick="rotateLeft()">
⟲
</button>

<button
class="control-btn"
onclick="rotateRight()">
⟳
</button>

<button
class="control-btn"
onclick="resetView()">
↺
</button>

<button
class="control-btn"
onclick="saveOutfit()">
💾
</button>

<button
class="control-btn"
onclick="resetOutfit()">
✖️
</button>

</div>

</div>

<div class="viewer-wrapper">

<!-- SWITCH -->

<div class="mannequin-switch">

<button
class="mannequin-btn active"
onclick="
changeMannequin(
'female',
this
)">
👩
</button>

<button
class="mannequin-btn"
onclick="
changeMannequin(
'hijab',
this
)">
🧕
</button>

</div>

<!-- VIEWER -->

<div
class="viewer"
id="viewerModel"
>

<img
id="baseModel"
class="layer base"
src="assets/mannequin.PNG"
>

<img
id="hijabLayer"
class="layer"
src=""
style="display:none;"
>

<img
id="topLayer"
class="layer"
src=""
>

<img
id="pantsLayer"
class="layer"
src=""
>

<img
id="shoesLayer"
class="layer"
src=""
>

</div>

</div>

</div>

<!-- CART -->

<div class="cart-panel">

<h2>CART</h2>

<div
class="cart-items"
id="cartItems">
</div>

<!-- SUMMARY -->

<div class="summary">

<div class="summary-row">

<span>Subtotal</span>

<span id="subtotalPrice">
IDR 0
</span>

</div>

<div class="summary-row">

<span>Shipping</span>

<span id="shippingPrice">
IDR 20.000
</span>

</div>

<div class="summary-row total">

<span>Total</span>

<span id="totalPrice">
IDR 0
</span>

</div>

<button
class="checkout-btn"
onclick="openCheckout()">
CHECKOUT
</button>

</div>

</div>

</div>

<!-- PRODUCT MODAL -->

<div
class="product-modal"
id="productModal">

<div class="modal-box">

<!-- CLOSE -->

<button
class="close-modal"
onclick="closeModal()">
✕
</button>

<!-- IMAGE -->

<img
id="modalImage"
class="modal-image"
src=""
>

<!-- INFO -->

<div class="modal-info">

<h2 id="modalTitle">
Product
</h2>

<p
class="modal-price"
id="modalPrice">
IDR 0
</p>

<p
class="modal-stock"
id="modalStock">
Stock: 0
</p>

<!-- SIZE -->

<div class="size-selector">

<div
class="size-btn active"
onclick="selectSize(this,'S')">
S
</div>

<div
class="size-btn"
onclick="selectSize(this,'M')">
M
</div>

<div
class="size-btn"
onclick="selectSize(this,'L')">
L
</div>

<div
class="size-btn"
onclick="selectSize(this,'XL')">
XL
</div>

</div>

<!-- COLOR -->

<div class="color-selector">

<div
class="color-btn active"
style="background:#111"
onclick="
selectColor(
this,
'Black',
'assets/hoodie-black.PNG'
)
">
</div>

<div
class="color-btn"
style="background:#d8d2c8"
onclick="
selectColor(
this,
'Cream',
'assets/hoodie-cream.PNG'
)
">
</div>

<div
class="color-btn"
style="background:#777"
onclick="
selectColor(
this,
'Gray',
'assets/hoodie-gray.PNG'
)
">
</div>

</div>

<p class="modal-desc">

Premium oversized fashion
with modern streetwear silhouette.

</p>

<button
class="modal-cart-btn"
onclick="addModalToCart()">
ADD TO CART
</button>

<button
class="wishlist-modal-btn"
onclick="toggleWishlist()">
♡ ADD TO WISHLIST
</button>

</div>

</div>

</div>

<!-- CHECKOUT MODAL -->

<div
class="checkout-modal"
id="checkoutModal">

<div class="checkout-box">

<!-- CLOSE -->

<button
class="close-modal"
onclick="closeCheckout()">
✕
</button>

<h2>
Checkout
</h2>

<!-- FORM -->

<div class="checkout-form">

<input
type="text"
placeholder="Full Name"
>

<input
type="text"
placeholder="Phone Number"
>

<textarea
placeholder="Shipping Address">
</textarea>

<select>

<option>
Payment Method
</option>

<option>
Bank Transfer
</option>

<option>
E-Wallet
</option>

<option>
COD
</option>

</select>

</div>

<!-- ORDER -->

<div class="checkout-summary">

<div class="summary-line">

<span>
Subtotal
</span>

<span id="checkoutSubtotal">
IDR 0
</span>

</div>

<div class="summary-line">

<span>
Shipping
</span>

<span>
IDR 20.000
</span>

</div>

<div class="summary-line total">

<span>
Total
</span>

<span id="checkoutTotal">
IDR 0
</span>

</div>

</div>

<button
class="place-order-btn"
onclick="placeOrder()">
PLACE ORDER
</button>

</div>

</div>

<!-- WISHLIST MODAL -->

<div
class="wishlist-modal"
id="wishlistModal">

<div class="wishlist-box">

<button
class="close-modal"
onclick="closeWishlist()">
✕
</button>

<h2>
Wishlist
</h2>

<div
class="wishlist-items"
id="wishlistItems">
</div>

</div>

</div>

<script src="
https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js
"></script>
<script src="script.js"></script>

</body>
</html>
