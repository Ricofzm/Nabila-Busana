<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>VogueFit</title>

<link rel="stylesheet"
href="style.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
VOGUEFIT
</div>

</nav>

<!-- MAIN -->

<div class="main">

<!-- LEFT -->

<div class="sidebar">

<h2>SELECT ITEM</h2>

<div class="tabs">

<div class="tab active"
onclick="showCategory('tops',this)">
TOP
</div>

<div class="tab"
onclick="showCategory('pants',this)">
PANTS
</div>

<div class="tab"
onclick="showCategory('shoes',this)">
SHOES
</div>

</div>

<!-- TOPS -->

<div class="product-grid category"
id="tops">

<div class="product-card"
onclick="
addToCart(
'Black Hoodie',
299000,
'assets/tbhoodie.PNG'
);

changeTop(
'assets/hoodie-black.PNG'
);
">

<img src="assets/tbhoodie.PNG">

<div class="product-name">
Black Hoodie
</div>

<div class="product-price">
IDR 299.000
</div>

</div>

</div>

<!-- PANTS -->

<div class="product-grid category"
id="pants"
style="display:none;">

<div class="product-card"
onclick="
addToCart(
'Cargo Pants',
259000,
'assets/pants-beige.PNG'
);

changePants(
'assets/pants-beige.PNG'
);
">

<img src="assets/pants-beige.PNG">

<div class="product-name">
Cargo Pants
</div>

<div class="product-price">
IDR 259.000
</div>

</div>

</div>

<!-- SHOES -->

<div class="product-grid category"
id="shoes"
style="display:none;">

<div class="product-card"
onclick="
addToCart(
'Sneakers White',
399000,
'assets/tbshoes.PNG'
);

changeShoes(
'assets/shoes-white.PNG'
);
">

<img src="assets/tbshoes.PNG">

<div class="product-name">
Sneakers White
</div>

<div class="product-price">
IDR 399.000
</div>

</div>

</div>

<button onclick="
changeTop('assets/hoodie-black.PNG')
">
Black Hoodie
</button>

<button onclick="
changePants('assets/pants-beige.PNG')
">
Cargo Pants
</button>

<button onclick="
changeShoes('assets/shoes-white.PNG')
">
Sneakers
</button>

</div>

<!-- CENTER -->

<div class="viewer">
    
<!-- CONTROLS -->
<div class="controls">

<button
class="control-btn"
onclick="zoomIn()">
＋
</button>

<button
class="control-btn"
onclick="zoomOut()">
－
</button>

<button
class="control-btn"
onclick="rotateLeft()">
⟲
</button>

<button
class="control-btn"
onclick="rotateRight()">
⟳
</button>

<button
class="control-btn"
onclick="resetView()">
↺
</button>

<button
class="control-btn"
onclick="saveOutfit()">
💾
</button>

<button
class="control-btn"
onclick="resetOutfit()">
✖️
</button>

</div>

<div
class="mannequin-area"
id="viewerModel">

<!-- BODY -->

<img
class="layer body"
src="assets/mannequin.PNG"
>

<!-- PANTS -->

<img
id="pantsLayer"
class="layer pants"
src="assets/pants-beige.PNG"
>

<!-- TOP -->

<img
id="topLayer"
class="layer top"
src="assets/hoodie-black.PNG"
>

<!-- SHOES -->

<img
id="shoesLayer"
class="layer shoes"
src="assets/shoes-white.PNG"
>

</div>

</div>

<!-- CART -->

<div class="cart-panel">

<h2>CART</h2>

<div
class="cart-items"
id="cartItems">
</div>

</div>

</div>

<!-- SUMMARY -->

<div class="summary">

<div class="summary-row">

<span>Subtotal</span>

<span id="totalPrice">
IDR 0
</span>

</div>

<div class="summary-row">

<span>Shipping</span>

<span id="shippingPrice">
IDR 20.000
</span>

</div>

<div class="summary-row total">

<span>Total</span>

<span id="totalPrice">
IDR 0
</span>

</div>

<button class="checkout-btn">
CHECKOUT
</button>

</div>

</div>

</div>

<script src="script.js"></script>
<script src="
https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js
"></script>
</body>
</html>
